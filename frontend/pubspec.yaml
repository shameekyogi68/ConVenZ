name: convenz_customer_app
description: A premium customer service booking application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.1
  go_router: ^14.0.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.0
  geolocator: ^13.0.0
  http: ^1.2.1
  url_launcher: ^6.3.0
  device_info_plus: ^11.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  permission_handler: ^11.3.0
  google_fonts: ^6.2.1
  dio: ^5.5.0
  logger: ^2.4.0
  flutter_local_notifications: ^21.0.0
  crypto: ^3.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
