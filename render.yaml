services:
  - type: web
    name: convenz-backend
    env: node
    # Since your backend is in the /backend folder, Render will automatically navigate here
    rootDir: backend
    plan: starter # Starter plan is reliable for production apps to start
    buildCommand: npm ci --production
    startCommand: npm start
    healthCheckPath: /health
    healthCheckTimeout: 30
    healthCheckInterval: 10
    healthCheckGracePeriod: 30
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      # ⚠️ The following variables will need to be securely pasted into your Render dashboard
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: API_SIGNING_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
